[package]
name = "onin"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
license = "GPL-3.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "onin_lib"
crate-type = ["staticlib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
whoami = "1.5.1"
tauri = { version = "2", features = [ "protocol-asset", "macos-private-api", "tray-icon"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1.11.1"
lnk = "0.5.1"
walkdir = "2.5.0"
opener = "0.7.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
windows = { version = "0.57", features = [
  "Win32_UI_Shell",
  "Win32_UI_WindowsAndMessaging",
  "Win32_Graphics_Gdi",
  "Win32_Foundation",
  "Win32_System_Com",
  "Win32_UI_Shell_PropertiesSystem",
  "Win32_System_DataExchange",
  "Win32_Storage_FileSystem",
  "Win32_UI_Input_KeyboardAndMouse",
] }
base64 = "0.22"
futures = "0.3" # 用于并发处理 futures
image = "0.25"
# Add `sync` for Mutex and `fs` for async file operations.
tokio = { version = "1", features = [
  "macros",
  "rt-multi-thread",
  "sync",
  "fs",
] }
num_cpus = "1.13"
tauri-plugin-store = "2"
tauri-plugin-dialog = "2"
tauri-plugin-clipboard-manager = "2"
once_cell = "1.19.0"
plist = "1.6.1"
icns = "0.3.0"
widestring = "0.5.1"
deno_core = "0.355.0"
tauri-plugin-notification = "2"
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json", "blocking"] }
url = "2.5"
tauri-plugin-os = "2"
tokio-cron-scheduler = "0.13"
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors"] }
zip = "2.2"
tempfile = "3.13"
meval = "0.2"

[target.'cfg(windows)'.dependencies]
winreg = "0.55"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString", "NSData", "NSObject", "NSDictionary", "NSNotification", "std"] }
objc2-app-kit = { version = "0.3", features = ["NSWorkspace", "NSImage", "NSBitmapImageRep", "NSGraphicsContext", "NSOpenPanel", "NSSavePanel", "NSWindow", "NSResponder", "NSApplication", "NSRunningApplication"] }
core-graphics = "0.25.0"

[target.'cfg(any(target_os = "macos", target_os = "windows", target_os = "linux"))'.dependencies]
clipboard-rs = "0.3"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-autostart = "2"
tauri-plugin-global-shortcut = "2"
