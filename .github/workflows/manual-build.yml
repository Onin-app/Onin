name: Manual Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for (e.g., v1.1.0)'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $version = $tag -replace '^v', ''
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev patchelf pkg-config libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build inject script
        run: pnpm build:inject

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GLITCHTIP_DSN: ${{ secrets.VITE_GLITCHTIP_DSN }}
          VITE_GLITCHTIP_ENVIRONMENT: production
          GLITCHTIP_DSN_NATIVE: ${{ secrets.GLITCHTIP_DSN_NATIVE }}
          GLITCHTIP_ENVIRONMENT: production
        with:
          projectPath: packages/app
          tagName: ${{ github.event.inputs.tag }}
          releaseName: 'Onin ${{ github.event.inputs.tag }}'
          releaseBody: 'Manual build for ${{ github.event.inputs.tag }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload frontend sourcemaps to GlitchTip
        if: matrix.platform == 'ubuntu-latest'
        env:
          SENTRY_URL: ${{ secrets.GLITCHTIP_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.GLITCHTIP_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.GLITCHTIP_ORG }}
          SENTRY_PROJECT: ${{ secrets.GLITCHTIP_PROJECT }}
        run: |
          # Use the modern artifact bundle flow supported by GlitchTip 4.2+.
          npx @sentry/cli@3.4.0 sourcemaps inject packages/app/build/_app/immutable
          npx @sentry/cli@3.4.0 sourcemaps upload packages/app/build/_app/immutable
