name: Manual Build and Upload

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g., v1.1.0)'
        required: true
        type: string

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: './src-tauri'

      - name: install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: src-tauri/target/release/bundle/msi/baize_${{ github.event.inputs.tag }}_x64_en-US.msi
          asset_name: baize-${{ github.event.inputs.tag }}-x64.msi
          asset_content_type: application/octet-stream

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: src-tauri/target/release/bundle/dmg/baize_${{ github.event.inputs.tag }}_x64.dmg
          asset_name: baize-${{ github.event.inputs.tag }}-x64.dmg
          asset_content_type: application/octet-stream