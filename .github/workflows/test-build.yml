name: Test Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check version
        run: |
          echo "Package version: $(node -p "require('./package.json').version")"
          echo "Tauri version: $(node -p "require('./src-tauri/tauri.conf.json').version")"

      - name: Build frontend
        run: pnpm build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Tauri build
        run: pnpm tauri build --debug