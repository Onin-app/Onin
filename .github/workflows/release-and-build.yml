name: Release and Build

on:
  push:
    branches:
      - master
    paths:
      - 'packages/app/**'
      - 'packages/sdk/**'
      - 'packages/create-onin-plugin/**'
      - 'packages/onin-inject/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/release-and-build.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      app_changed: ${{ steps.filter.outputs.app }}
      onin_inject_changed: ${{ steps.filter.outputs.onin_inject }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'packages/app/**'
            onin_inject:
              - 'packages/onin-inject/**'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm check
          pnpm build

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 记录发布前的版本
          OLD_VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "Version before release: $OLD_VERSION"

          # 运行 semantic-release
          pnpm release

          # 记录发布后的版本
          NEW_VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "Version after release: $NEW_VERSION"

          # 检查版本是否发生变化或者是否有新的 tag
          if [ "$OLD_VERSION" != "$NEW_VERSION" ] || git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "New release created: v$NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No new release created"
          fi

  publish-sdk:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump SDK version
        run: |
          cd packages/sdk
          npm version ${{ needs.release.outputs.version }} --no-git-tag-version

      - name: Build SDK
        run: pnpm build:sdk

      - name: Publish SDK to npm
        run: |
          cd packages/sdk
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-create-onin-plugin:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump create-onin-plugin version
        run: |
          cd packages/create-onin-plugin
          npm version ${{ needs.release.outputs.version }} --no-git-tag-version

      - name: Build create-onin-plugin
        run: pnpm --filter create-onin-plugin build

      - name: Publish create-onin-plugin to npm
        run: |
          cd packages/create-onin-plugin
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-tauri:
    needs: release
    if: needs.release.outputs.released == 'true' && (needs.release.outputs.app_changed == 'true' || needs.release.outputs.onin_inject_changed == 'true')
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Debug outputs
        run: |
          echo "Released: ${{ needs.release.outputs.released }}"
          echo "Version: ${{ needs.release.outputs.version }}"
          echo "Tag: ${{ needs.release.outputs.tag }}"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev patchelf pkg-config libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify app version
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./packages/app/package.json').version")
          TAURI_VERSION=$(node -p "require('./packages/app/src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(grep -m1 '^version = ' packages/app/src-tauri/Cargo.toml | sed -E 's/version = \"([^\"]+)\"/\1/')

          echo "Expected version: ${{ needs.release.outputs.version }}"
          echo "package.json: $APP_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          test "$APP_VERSION" = "${{ needs.release.outputs.version }}"
          test "$TAURI_VERSION" = "${{ needs.release.outputs.version }}"
          test "$CARGO_VERSION" = "${{ needs.release.outputs.version }}"

      - name: Build inject script
        run: pnpm build:inject

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GLITCHTIP_DSN: ${{ secrets.VITE_GLITCHTIP_DSN }}
          VITE_GLITCHTIP_ENVIRONMENT: production
          GLITCHTIP_DSN_NATIVE: ${{ secrets.GLITCHTIP_DSN_NATIVE }}
          GLITCHTIP_ENVIRONMENT: production
        with:
          projectPath: packages/app
          tagName: ${{ needs.release.outputs.tag }}
          releaseName: 'Onin v${{ needs.release.outputs.version }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Collect release assets 📦
        shell: bash
        run: |
          mkdir -p dist
          # 动态检索并统一拷贝各平台的发布二进制包
          find packages/app/src-tauri/target/release/bundle/nsis/ -name "*.exe" -exec cp {} dist/ \; 2>/dev/null || true
          find packages/app/src-tauri/target/release/bundle/dmg/ -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find packages/app/src-tauri/target/release/bundle/appimage/ -name "*.AppImage" -exec cp {} dist/ \; 2>/dev/null || true
          find packages/app/src-tauri/target/release/bundle/deb/ -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          echo "Collected assets successfully:"
          ls -la dist/

      - name: Upload to Aliyun OSS 🚀
        # 使用纯 JavaScript 实现的阿里云 OSS 自动上传 Action
        # 无需下载任何原生 CLI 二进制工具，从原理上 100% 根治了 macOS (Unknown system error -8) 及 Windows (Unable to locate executable) 等一切平台架构兼容硬伤！
        # ⚠️ 请确保在 GitHub 仓库中配置了对应的 Secrets:
        # - OSS_ACCESS_KEY_ID
        # - OSS_ACCESS_KEY_SECRET
        # - OSS_REGION (例如: oss-cn-beijing)
        # - OSS_BUCKET
        uses: tiyee/aliyun-oss-auto-upload@v2.0.7
        with:
          region: ${{ secrets.OSS_REGION }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          bucket: ${{ secrets.OSS_BUCKET }}
          local-folder: dist
          remote-dir: releases/v${{ needs.release.outputs.version }}

      # 💡 提示：若您使用的是腾讯云 COS，可使用如下官方 Action 替换上方阿里云步骤：
      # - name: Upload to Tencent Cloud COS 🚀
      #   uses: tencentcloudact/cos-action@v1
      #   with:
      #     secret_id: ${{ secrets.COS_SECRET_ID }}
      #     secret_key: ${{ secrets.COS_SECRET_KEY }}
      #     bucket: ${{ secrets.COS_BUCKET }}
      #     region: ${{ secrets.COS_REGION }}
      #     cos_dir: 'releases/v${{ needs.release.outputs.version }}/'
      #     local_path: 'dist'

      # 💡 提示：若您使用的是 AWS S3 兼容的对象存储（如 Cloudflare R2 等），可使用如下 Action：
      # - name: Upload to Cloudflare R2 🚀
      #   uses: jakejarvis/s3-sync-action@master
      #   with:
      #     args: --follow-symlinks --delete
      #   env:
      #     AWS_S3_BUCKET: ${{ secrets.R2_BUCKET }}
      #     AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      #     AWS_REGION: 'auto'
      #     AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      #     SOURCE_DIR: 'dist'
      #     DEST_DIR: 'releases/v${{ needs.release.outputs.version }}'

      - name: Upload frontend sourcemaps to GlitchTip
        if: matrix.platform == 'ubuntu-latest'
        env:
          SENTRY_URL: ${{ secrets.GLITCHTIP_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.GLITCHTIP_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.GLITCHTIP_ORG }}
          SENTRY_PROJECT: ${{ secrets.GLITCHTIP_PROJECT }}
        run: |
          # Use the modern artifact bundle flow supported by GlitchTip 4.2+.
          npx @sentry/cli@3.4.0 sourcemaps inject packages/app/build/_app/immutable
          npx @sentry/cli@3.4.0 sourcemaps upload packages/app/build/_app/immutable
