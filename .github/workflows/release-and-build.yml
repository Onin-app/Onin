name: Release and Build

on:
  push:
    branches:
      - master
    paths:
      - 'packages/app/**'
      - 'packages/sdk/**'
      - 'packages/create-onin-plugin/**'
      - 'packages/onin-inject/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/release-and-build.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      app_changed: ${{ steps.filter.outputs.app }}
      onin_inject_changed: ${{ steps.filter.outputs.onin_inject }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'packages/app/**'
            onin_inject:
              - 'packages/onin-inject/**'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm check
          pnpm build

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 记录发布前的版本
          OLD_VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "Version before release: $OLD_VERSION"

          # 运行 semantic-release
          pnpm release

          # 记录发布后的版本
          NEW_VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "Version after release: $NEW_VERSION"

          # 检查版本是否发生变化或者是否有新的 tag
          if [ "$OLD_VERSION" != "$NEW_VERSION" ] || git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "New release created: v$NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No new release created"
          fi

  publish-sdk:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump SDK version
        run: |
          cd packages/sdk
          npm version ${{ needs.release.outputs.version }} --no-git-tag-version

      - name: Build SDK
        run: pnpm build:sdk

      - name: Publish SDK to npm
        run: |
          cd packages/sdk
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-create-onin-plugin:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump create-onin-plugin version
        run: |
          cd packages/create-onin-plugin
          npm version ${{ needs.release.outputs.version }} --no-git-tag-version

      - name: Build create-onin-plugin
        run: pnpm --filter create-onin-plugin build

      - name: Publish create-onin-plugin to npm
        run: |
          cd packages/create-onin-plugin
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-tauri:
    needs: release
    if: needs.release.outputs.released == 'true' && (needs.release.outputs.app_changed == 'true' || needs.release.outputs.onin_inject_changed == 'true')
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Debug outputs
        run: |
          echo "Released: ${{ needs.release.outputs.released }}"
          echo "Version: ${{ needs.release.outputs.version }}"
          echo "Tag: ${{ needs.release.outputs.tag }}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev patchelf pkg-config libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build inject script
        run: pnpm build:inject

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GLITCHTIP_DSN: ${{ secrets.VITE_GLITCHTIP_DSN }}
          VITE_GLITCHTIP_ENVIRONMENT: production
          GLITCHTIP_DSN_NATIVE: ${{ secrets.GLITCHTIP_DSN_NATIVE }}
          GLITCHTIP_ENVIRONMENT: production
        with:
          projectPath: packages/app
          tagName: ${{ needs.release.outputs.tag }}
          releaseName: 'Onin v${{ needs.release.outputs.version }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload frontend sourcemaps to GlitchTip
        if: matrix.platform == 'ubuntu-latest'
        env:
          SENTRY_URL: ${{ secrets.GLITCHTIP_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.GLITCHTIP_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.GLITCHTIP_ORG }}
          SENTRY_PROJECT: ${{ secrets.GLITCHTIP_PROJECT }}
        run: |
          # Use the modern artifact bundle flow supported by GlitchTip 4.2+.
          npx @sentry/cli@3.4.0 sourcemaps inject packages/app/build
          npx @sentry/cli@3.4.0 sourcemaps upload packages/app/build
