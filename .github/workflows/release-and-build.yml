name: Release and Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run checks
        run: |
          pnpm check
          pnpm build

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 记录发布前的版本
          OLD_VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "Version before release: $OLD_VERSION"

          # 运行 semantic-release
          pnpm release

          # 记录发布后的版本
          NEW_VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "Version after release: $NEW_VERSION"

          # 检查版本是否发生变化或者是否有新的 tag
          if [ "$OLD_VERSION" != "$NEW_VERSION" ] || git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "New release created: v$NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No new release created"
          fi

  build-tauri:
    needs: release
    if: always()
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Debug outputs
        run: |
          echo "Released: ${{ needs.release.outputs.released }}"
          echo "Version: ${{ needs.release.outputs.version }}"
          echo "Tag: ${{ needs.release.outputs.tag }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxdo-dev patchelf pkg-config libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/app/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/app
          tagName: ${{ needs.release.outputs.tag }}
          releaseName: 'Onin v${{ needs.release.outputs.version }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
